# Tools installed to ~/.local/bin (compiled) or ~/bin (scripts/symlinks)
#
# source_builds fields:
#   repo      — git URL to clone
#   build     — shell command to build (run from repo root, $INSTALLDIR is ~/.local/bin)
#   needs     — list of commands that must be on PATH (optional)
#
# cloned_repos fields:
#   repo      — git URL to clone
#   dest      — local path to clone into (~ is expanded to $HOME)
#
# local_links fields:
#   source    — path to the file to symlink (~ is expanded to $HOME)
#   dest      — target directory (~ is expanded to $HOME, default: ~/.local/bin)

[source_builds.hell]
repo = "https://github.com/chrisdone/hell.git"
build = "cabal install --install-method=copy --installdir=$INSTALLDIR"
needs = ["cabal"]

[cloned_repos.svns]
repo = "https://github.com/JulianBD/svns.git"
dest = "~/Code/svns"

[local_links.svns]
source = "~/Code/svns/svns.hs"
dest = "~/bin"
