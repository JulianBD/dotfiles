shell:
  env:
    IGNORE_AUTH_TEST: "true"
    IGNORE_HOST_CONF: "true"
    TFENV_ARCH: "amd64"
    GODEBUG: "asyncpreemptoff=1"

  aliases:
    - cmd: cat
      expand: "bat --style=plain --paging=never"
      requires: bat
    - cmd: ls
      expand: "eza"
      requires: eza
    - cmd: lt
      expand: "eza --tree --level=2 --long --icons --git"
      requires: eza
    - cmd: find
      expand: "fd"
      requires: fd
    - cmd: vim
      expand: "nvim"
      requires: nvim
    - cmd: j
      expand: "just"

  # PATH entries relative to $HOME, prepended in order.
  paths_home:
    - .local/bin
    - bin
    - .ghcup/bin
    - .cabal/bin
    - .config/argc-completions/bin

  # Absolute PATH entries, prepended in order.
  paths_absolute:
    - /opt/homebrew/Caskroom/sqlcl/25.3.1.311.1257/sqlcl/bin
